<!DOCTYPE html>
<html lang="zh-HK">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>French Verbs</title>
    <style>
        :root {
            --bg: #f2f2f7; 
            --card-bg: #ffffff;
            --text-main: #000000;
            --text-sub: #8e8e93;
            --blue: #007aff;
            --border: #c6c6c8;
            --tag-a1: #34c759;
            --tag-a2: #ff9500;
            --tag-reg: #5ac8fa;
            --tag-irreg: #ff3b30;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", Arial, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 0;
            overflow: hidden; 
            -webkit-font-smoothing: antialiased;
        }

        /* View Containers */
        .view {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: var(--bg);
            display: flex;
            flex-direction: column;
            transition: transform 0.3s cubic-bezier(0.25, 0.8, 0.25, 1);
        }

        #listView { transform: translateX(0); z-index: 1; }
        
        #detailView { 
            transform: translateX(100%); 
            z-index: 2; 
            background-color: var(--bg);
            box-shadow: -5px 0 15px rgba(0,0,0,0.1);
        }
        #detailView.active { transform: translateX(0); }

        /* Headers */
        .header {
            background-color: var(--card-bg);
            padding-top: max(10px, env(safe-area-inset-top));
            padding-bottom: 10px;
            text-align: center;
            border-bottom: 1px solid var(--border);
            position: relative;
            z-index: 10;
        }
        .header h1 {
            margin: 0;
            font-size: 17px;
            font-weight: 600;
            line-height: 44px;
        }

        .back-btn {
            position: absolute;
            left: 10px;
            bottom: 10px;
            color: var(--blue);
            font-size: 17px;
            background: none;
            border: none;
            line-height: 44px;
            padding: 0 10px;
            cursor: pointer;
            display: flex;
            align-items: center;
        }
        .back-btn::before {
            content: "‹";
            font-size: 28px;
            margin-right: 5px;
            line-height: 1;
            margin-top: -4px;
        }

        /* Search & Filters */
        .top-controls {
            background-color: var(--card-bg);
            border-bottom: 1px solid var(--border);
        }
        .search-container {
            padding: 10px 16px 5px 16px;
        }
        #searchInput {
            width: 100%;
            padding: 10px 14px;
            font-size: 17px;
            background-color: #e3e3e8;
            border: none;
            border-radius: 10px;
            box-sizing: border-box;
            outline: none;
            -webkit-appearance: none;
        }

        /* Filter Chips Container */
        .filter-container {
            display: flex;
            overflow-x: auto;
            padding: 5px 16px 12px 16px;
            gap: 10px;
            -webkit-overflow-scrolling: touch;
        }
        /* Hide scrollbar for filters */
        .filter-container::-webkit-scrollbar { display: none; }
        
        .filter-chip {
            padding: 6px 14px;
            background-color: #e3e3e8;
            color: var(--text-main);
            border-radius: 16px;
            font-size: 14px;
            font-weight: 500;
            white-space: nowrap;
            flex-shrink: 0;
            cursor: pointer;
            transition: all 0.2s;
        }
        .filter-chip.active {
            background-color: var(--blue);
            color: white;
        }

        /* Scrollable Content */
        .scroll-content {
            flex: 1;
            overflow-y: auto;
            -webkit-overflow-scrolling: touch;
            padding-bottom: max(20px, env(safe-area-inset-bottom));
        }

        /* List Items */
        .verb-list {
            background: var(--card-bg);
            border-top: 1px solid var(--border);
            border-bottom: 1px solid var(--border);
            margin-top: 10px;
        }
        .verb-item {
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            cursor: pointer;
        }
        .verb-item:last-child { border-bottom: none; }
        .verb-item:active { background-color: #e5e5ea; }
        
        .verb-info { display: flex; flex-direction: column; gap: 4px; }
        .verb-title { font-size: 17px; font-weight: 500; }
        .verb-trans { font-size: 15px; color: var(--text-sub); }
        
        /* Small Tags inside list */
        .tags-row { display: flex; gap: 6px; margin-top: 2px; }
        .tag {
            font-size: 11px;
            font-weight: 600;
            padding: 2px 6px;
            border-radius: 4px;
            color: white;
        }
        .tag-a1 { background-color: var(--tag-a1); }
        .tag-a2 { background-color: var(--tag-a2); }
        .tag-reg { background-color: var(--tag-reg); }
        .tag-irreg { background-color: var(--tag-irreg); }

        .chevron { color: #c7c7cc; font-size: 20px; font-weight: bold;}

        /* Detail Cards */
        .verb-header { padding: 20px 16px 10px; }
        .verb-header h2 { margin: 0; font-size: 32px; font-weight: 700; color: var(--text-main); }
        .verb-header p { margin: 5px 0 10px 0; font-size: 17px; color: var(--text-sub); }

        .card {
            background: var(--card-bg);
            border-radius: 12px;
            margin: 16px;
            padding: 0;
            overflow: hidden;
        }
        .card-header {
            background-color: #f9f9f9;
            padding: 10px 16px;
            font-weight: 600;
            font-size: 15px;
            border-bottom: 1px solid var(--border);
            color: var(--text-sub);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .conj-row { 
            display: flex; 
            justify-content: space-between; 
            padding: 12px 16px; 
            border-bottom: 1px solid var(--border); 
            font-size: 17px;
        }
        .conj-row:last-child { border-bottom: none; }
        .pronoun { color: var(--text-sub); width: 40%; }
        .verb-form { color: var(--text-main); font-weight: 500; width: 60%; }

    </style>
</head>
<body>

    <div id="listView" class="view">
        <div class="header">
            <h1>法文動詞 A1-A2</h1>
        </div>
        
        <div class="top-controls">
            <div class="search-container">
                <input type="text" id="searchInput" placeholder="搜尋動詞 (法文/英文)..." autocomplete="off" autocorrect="off" autocapitalize="none">
            </div>
            <div class="filter-container">
                <div class="filter-chip active" onclick="setFilter('all', this)">全部</div>
                <div class="filter-chip" onclick="setFilter('A1', this)">A1 級別</div>
                <div class="filter-chip" onclick="setFilter('A2', this)">A2 級別</div>

                <div class="filter-chip" onclick="setFilter('irreg', this)">不規則動詞</div>
            </div>
        </div>

        <div class="scroll-content">
            <div class="verb-list" id="verbList"></div>
        </div>
    </div>

    <div id="detailView" class="view">

        // STATE & ENGINE
        let activeFilter = 'all';

        const pronouns = ["Je / J'", "Tu", "Il / Elle / On", "Nous", "Vous", "Ils / Elles"];
        const pc_avoir = ["ai", "as", "a", "avons", "avez", "ont"];
        const pc_etre = ["suis", "es", "est", "sommes", "êtes", "sont"];
        
        function startsWithVowel(word) { return /^[aeiouhéèêàâîïôûù]/i.test(word); }
        function formatPronoun(pronounStr, verbStr) {
            if (pronounStr === "Je / J'") return startsWithVowel(verbStr) ? "J'" : "Je";
            return pronounStr;
        }

        function conjugate(verbObj) {
            let pres = [], pc = [], imp = [];
            const isEtre = verbObj.aux === "e";
            const auxVerbs = isEtre ? pc_etre : pc_avoir;
            const inf = verbObj.v;

            if (verbObj.t === "irreg") {
                pres = verbObj.pres;
                let agreement = isEtre ? "(e)(s)" : "";
                pc = auxVerbs.map(a => `${a} ${verbObj.pp}${agreement}`);
                const imp_endings = ["ais", "ais", "ait", "ions", "iez", "aient"];
                imp = imp_endings.map(e => verbObj.imp_stem + e);
            } 
            else if (verbObj.t === "er") {
                const stem = inf.slice(0, -2);
                let pres_stems = [stem, stem, stem, stem, stem, stem];
                if (verbObj.sp) {
                    if (verbObj.sp === "ger") pres_stems[3] = stem + "e"; 
                    else if (verbObj.sp === "cer") pres_stems[3] = stem.slice(0,-1) + "ç"; 
                    else { pres_stems[0]=verbObj.sp; pres_stems[1]=verbObj.sp; pres_stems[2]=verbObj.sp; pres_stems[5]=verbObj.sp; }
                }
                pres = [pres_stems[0]+"e", pres_stems[1]+"es", pres_stems[2]+"e", pres_stems[3]+"ons", pres_stems[4]+"ez", pres_stems[5]+"ent"];
                let agreement = isEtre ? "(e)(s)" : "";
                pc = auxVerbs.map(a => `${a} ${stem}é${agreement}`);
                let imp_stem = pres_stems[3];
                const imp_endings = ["ais", "ais", "ait", "ions", "iez", "aient"];
                imp = imp_endings.map(e => imp_stem + e);
            }
            else if (verbObj.t === "ir") {
                const stem = inf.slice(0, -2);
                pres = [stem+"is", stem+"is", stem+"it", stem+"issons", stem+"issez", stem+"issent"];
                pc = auxVerbs.map(a => `${a} ${stem}i`);
                const imp_endings = ["issais", "issais", "issait", "issions", "issiez", "issaient"];
                imp = imp_endings.map(e => stem + e);
            }
            else if (verbObj.t === "re") {
                const stem = inf.slice(0, -2);
                pres = [stem+"s", stem+"s", stem, stem+"ons", stem+"ez", stem+"ent"];
                let agreement = isEtre ? "(e)(s)" : "";
                pc = auxVerbs.map(a => `${a} ${stem}u${agreement}`);
                const imp_endings = ["ais", "ais", "ait", "ions", "iez", "aient"];
                imp = imp_endings.map(e => stem + e);
            }
            return { pres, pc, imp };
        }

        // DOM ELEMENTS
        const verbListEl = document.getElementById('verbList');
        const searchInput = document.getElementById('searchInput');
        const detailView = document.getElementById('detailView');
        const detailTitle = document.getElementById('detailTitle');
        const detailContent = document.getElementById('detailContent');

        function setFilter(filterValue, element) {
            // Update active state in UI
            document.querySelectorAll('.filter-chip').forEach(chip => chip.classList.remove('active'));
            element.classList.add('active');
            
            // Update state and re-render list
            activeFilter = filterValue;
            renderList(searchInput.value);
        }

        function renderList(searchText = "") {
            verbListEl.innerHTML = "";
            
            // Apply both text search AND category filter
            const filtered = db.filter(v => {
                const matchesSearch = v.v.toLowerCase().includes(searchText.toLowerCase()) || 
                                      v.tr.toLowerCase().includes(searchText.toLowerCase());
                
                let matchesCategory = true;
                if (activeFilter === 'A1') matchesCategory = (v.lvl === 'A1');
                if (activeFilter === 'A2') matchesCategory = (v.lvl === 'A2');
                if (activeFilter === 'reg') matchesCategory = (v.t === 'er' || v.t === 'ir' || v.t === 're');
                if (activeFilter === 'irreg') matchesCategory = (v.t === 'irreg');

                return matchesSearch && matchesCategory;
            });

            filtered.sort((a,b) => a.v.localeCompare(b.v));

            filtered.forEach(verbObj => {
                const div = document.createElement('div');
                div.className = 'verb-item';
                
                // Determine Tag Text and Class
                const typeText = verbObj.t === 'irreg' ? '不規則' : `-${verbObj.t}`;
                const typeClass = verbObj.t === 'irreg' ? 'tag-irreg' : 'tag-reg';
                const lvlClass = verbObj.lvl === 'A1' ? 'tag-a1' : 'tag-a2';

                div.innerHTML = `
                    <div class="verb-info">
                        <div class="verb-title">${verbObj.v}</div>
                        <div class="verb-trans">${verbObj.tr}</div>
                        <div class="tags-row">
                            <span class="tag ${lvlClass}">${verbObj.lvl}</span>
                            <span class="tag ${typeClass}">${typeText}</span>
                        </div>
                    </div>
                    <div class="chevron">›</div>
                `;
                div.onclick = () => showDetail(verbObj);
                verbListEl.appendChild(div);
            });
        }

        function buildCard(title, pronounList, verbForms) {
            let html = `<div class="card"><div class="card-header">${title}</div>`;
            for(let i=0; i<6; i++) {
                let p = formatPronoun(pronounList[i], verbForms[i]);
                html += `<div class="conj-row"><span class="pronoun">${p}</span><span class="verb-form">${verbForms[i]}</span></div>`;
            }
            html += `</div>`;
            return html;
        }

        function showDetail(verbObj) {
            searchInput.blur(); 
            detailTitle.innerText = verbObj.v;
            
            const conj = conjugate(verbObj);
            const typeText = verbObj.t === 'irreg' ? '不規則動詞' : `規則動詞 (-${verbObj.t})`;
            const typeClass = verbObj.t === 'irreg' ? 'tag-irreg' : 'tag-reg';
            const lvlClass = verbObj.lvl === 'A1' ? 'tag-a1' : 'tag-a2';

            detailContent.innerHTML = `
                <div class="verb-header">
                    <h2>${verbObj.v}</h2>
                    <p>${verbObj.tr}</p>
                    <div class="tags-row">
                        <span class="tag ${lvlClass}">${verbObj.lvl}</span>
                        <span class="tag ${typeClass}">${typeText}</span>
                    </div>
                </div>
                ${buildCard("Présent (現在式)", pronouns, conj.pres)}
                ${buildCard("Passé Composé (過去式)", pronouns, conj.pc)}
                ${buildCard("Imparfait (未完成過去式)", pronouns, conj.imp)}
            `;
            
            detailContent.scrollTop = 0;
            detailView.classList.add('active');
        }

        function hideDetail() {
            detailView.classList.remove('active');
        }

        searchInput.addEventListener('input', (e) => renderList(e.target.value));

        // Initial Load
        renderList();
    </script>
</body>
</html>
